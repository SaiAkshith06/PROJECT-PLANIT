<!doctype html>
<html lang="en" style="scroll-behavior: smooth;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>AI Travel Planner</title>
    <meta name="description" content="Full-stack travel planning application" />
    <!-- Prepend script to apply dark mode before React paints to prevent flicker -->
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var theme = localTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
    <meta name="author" content="Akshith" />
    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="AI Travel Planner" />
    <meta property="og:description" content="Full-stack travel planning application" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@travelplanner" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
