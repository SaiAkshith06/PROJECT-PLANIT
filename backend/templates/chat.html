<!-- Chatbot Floating Widget -->
<style>
    .chat-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 350px;
        max-height: 500px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        z-index: 9999;
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    .chat-widget.collapsed {
        transform: translateY(calc(100% - 50px));
    }

    .chat-header {
        background: #2563eb;
        color: white;
        padding: 12px 15px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }

    .chat-header button {
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .chat-body {
        padding: 15px;
        flex: 1;
        overflow-y: auto;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 350px;
    }

    .chat-message {
        max-width: 80%;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        line-height: 1.4;
    }

    .chat-message.ai {
        background: #e2e8f0;
        align-self: flex-start;
        border-bottom-left-radius: 2px;
    }

    .chat-message.user {
        background: #2563eb;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
    }

    .chat-input {
        display: flex;
        padding: 10px;
        background: white;
        border-top: 1px solid #e2e8f0;
    }

    .chat-input input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        outline: none;
        font-size: 0.9rem;
    }

    .chat-input button {
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        margin-left: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .chat-input button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
    }
</style>

<div class="chat-widget collapsed" id="chat-widget">
    <div class="chat-header" id="chat-header">
        <span>🤖 PlanIt Assistant</span>
        <button id="chat-toggle">▲</button>
    </div>
    <div class="chat-body" id="chat-body">
        <div class="chat-message ai">
            Hi! I'm your AI Travel Assistant. How can I help you plan your trip today? Try asking "Plan a 3-day trip
            from Hyderabad" or "Find cheap hotels in Warangal".
        </div>
    </div>
    <div class="chat-input">
        <input type="text" id="chat-input-field" placeholder="Ask me anything..." onkeypress="handleChatEnter(event)">
        <button id="chat-send-btn" onclick="sendChatMessage()">➤</button>
    </div>
</div>

<script src="{{ url_for('static', filename='chat.js') }}"></script>
